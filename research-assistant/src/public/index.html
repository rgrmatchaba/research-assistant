<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 2rem;
      color: #ffffff;
    }

    .search-bar {
      display: flex;
      gap: 0.75rem;
      width: 100%;
      max-width: 700px;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }

    input:focus { border-color: #555; }

    button {
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #ffffff;
      color: #000000;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 1rem;
      min-height: 1.2rem;
    }

    .sources {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .source-chip {
      font-size: 0.75rem;
      padding: 4px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      color: #aaa;
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .source-chip:hover { border-color: #666; color: #ddd; }

    .report {
      width: 100%;
      max-width: 700px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      line-height: 1.8;
      font-size: 0.95rem;
      white-space: pre-wrap;
      min-height: 100px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #888;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <h1>Research Assistant</h1>

  <div class="search-bar">   
    <input
      type="text"
      id="input"
      placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter') ask()"
    />
    <button id="btn" onclick="ask()">Research</button>
  </div>

  <div class="status" id="status"></div>
  <div class="sources" id="sources"></div>
  <div class="report" id="report"></div>

  <script>
    async function ask() {
      const input = document.getElementById('input')
      const btn = document.getElementById('btn')
      const status = document.getElementById('status')
      const sources = document.getElementById('sources')
      const report = document.getElementById('report')

      const question = input.value.trim()
      if (!question) return

      // Reset UI
      btn.disabled = true
      sources.innerHTML = ''
      report.innerHTML = '<span class="cursor"></span>'
      let reportText = ''     

      // Open the SSE stream
      const url = `${window.location.origin}ask/stream?question=${encodeURIComponent(question)}`
      const eventSource = new EventSource(url)

      eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data)

        if (data.type === 'status') {
          // Show pipeline progress
          status.textContent = data.message
        }

        if (data.type === 'metadata') {
          // Render source chips
          data.sources.forEach(source => {
            const a = document.createElement('a')
            a.href = source.url
            a.target = '_blank'
            a.className = 'source-chip'
            a.textContent = source.title
            sources.appendChild(a)
          })
        }

        if (data.type === 'token') {
          // Append each token as it arrives
          reportText += data.value
          report.innerHTML = reportText + '<span class="cursor"></span>'
        }

        if (data.type === 'done') {
          // Clean up when stream ends
          report.innerHTML = reportText
          status.textContent = 'Done'
          btn.disabled = false
          eventSource.close()
        }

        if (data.type === 'error') {
          status.textContent = 'Something went wrong. Try again.'
          btn.disabled = false
          eventSource.close()
        }
      }

      eventSource.onerror = () => {
        status.textContent = 'Connection error.'
        btn.disabled = false
        eventSource.close()
      }
    }
  </script>
</body>
</html>
